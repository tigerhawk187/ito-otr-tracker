<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renewance | ITO-OTR Project Tracker</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --text-muted: #484f58;
      --tg1: #1f6feb;
      --tg1-bg: #0d2044;
      --tg1-light: #388bfd;
      --tg3: #e3a008;
      --tg3-bg: #2d2000;
      --tg3-light: #f0b429;
      --tg4: #1a7f37;
      --tg4-bg: #0a2e14;
      --tg4-light: #3fb950;
      --tg6: #8957e5;
      --tg6-bg: #1e1040;
      --tg6-light: #bc8cff;
      --win: #3fb950;
      --danger: #f85149;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── HEADER ─────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #1f6feb, #8957e5);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 14px; color: white;
      letter-spacing: -0.5px; flex-shrink: 0;
    }
    .header-title h1 { font-size: 15px; font-weight: 600; color: var(--text); }
    .header-title p  { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
    .last-updated {
      font-size: 11px; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
    }
    .refresh-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--win);
      animation: pulse 2.5s infinite;
    }
    .refresh-dot.stale { background: #e3a008; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.35; }
    }

    /* ─── STATS BAR ───────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      flex: 1;
      padding: 16px 20px;
      background: var(--surface);
    }
    .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .stat-value { font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 5px; }
    .stat-sub   { font-size: 11px; color: var(--text-muted); }
    .stat-value.blue   { color: var(--tg1-light); }
    .stat-value.green  { color: var(--win); }
    .stat-value.orange { color: var(--tg3-light); }
    .stat-value.purple { color: var(--tg6-light); }
    .win-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 6px; overflow: hidden; }
    .win-fill { height: 100%; border-radius: 2px; background: var(--win); transition: width 0.8s ease; }

    /* ─── TOOLBAR ─────────────────────────────────────────────── */
    .toolbar {
      padding: 11px 18px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }
    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      padding: 7px 10px 7px 32px;
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--tg1-light); }
    input[type="text"]::placeholder { color: var(--text-muted); }
    select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: var(--tg1-light); }
    .filter-count { font-size: 12px; color: var(--text-muted); margin-left: auto; white-space: nowrap; }

    /* ─── BOARD ───────────────────────────────────────────────── */
    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 14px;
      align-items: start;
    }

    /* ─── COLUMN ──────────────────────────────────────────────── */
    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .col-header {
      padding: 11px 13px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .col-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      padding: 3px 7px; border-radius: 4px; text-transform: uppercase;
    }
    .tg1 .col-badge { background: var(--tg1-bg); color: var(--tg1-light); border: 1px solid var(--tg1); }
    .tg3 .col-badge { background: var(--tg3-bg); color: var(--tg3-light); border: 1px solid var(--tg3); }
    .tg4 .col-badge { background: var(--tg4-bg); color: var(--tg4-light); border: 1px solid var(--tg4); }
    .tg6 .col-badge { background: var(--tg6-bg); color: var(--tg6-light); border: 1px solid var(--tg6); }
    .col-name  { font-size: 13px; font-weight: 600; color: var(--text); }
    .col-count {
      margin-left: auto;
      font-size: 11px; color: var(--text-dim);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 2px 8px;
    }
    .col-body { padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 80px; }

    /* ─── CARD ────────────────────────────────────────────────── */
    .card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 11px 12px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    }
    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    }
    .tg1 .card:hover { border-color: var(--tg1); }
    .tg3 .card:hover { border-color: var(--tg3); }
    .tg4 .card:hover { border-color: var(--tg4); }
    .tg6 .card:hover { border-color: var(--tg6); }

    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px; margin-bottom: 3px;
    }
    .card-client { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .card-amount { font-size: 12px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .tg1 .card-amount { color: var(--tg1-light); }
    .tg3 .card-amount { color: var(--tg3-light); }
    .tg4 .card-amount { color: var(--tg4-light); }
    .tg6 .card-amount { color: var(--tg6-light); }
    .card-project {
      font-size: 11px; color: var(--text-dim); line-height: 1.4;
      margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-owner  { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); }
    .avatar {
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 700; color: white; flex-shrink: 0;
    }
    .card-date { font-size: 10px; color: var(--text-muted); }

    /* Progress (Planner tasks) */
    .card-progress { margin-bottom: 8px; }
    .prog-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }
    .prog-bar  { height: 3px; border-radius: 2px; background: var(--border); overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 2px; }
    .tg3 .prog-fill { background: var(--tg3-light); }
    .tg4 .prog-fill { background: var(--tg4-light); }
    .tg6 .prog-fill { background: var(--tg6-light); }

    /* Empty state */
    .col-empty { padding: 28px 14px; text-align: center; color: var(--text-muted); }
    .col-empty-icon { margin-bottom: 8px; opacity: 0.35; }
    .col-empty p { font-size: 12px; line-height: 1.5; }
    .pa-note {
      margin-top: 10px; font-size: 11px; color: var(--text-muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px; line-height: 1.5;
    }

    /* ─── MODAL ───────────────────────────────────────────────── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 200;
      align-items: center; justify-content: center; padding: 20px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-hd {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 10px;
    }
    .m-pill {
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      padding: 4px 9px; border-radius: 4px; text-transform: uppercase;
      flex-shrink: 0; margin-top: 2px;
    }
    .m-title { flex: 1; }
    .m-client  { font-size: 16px; font-weight: 700; line-height: 1.3; }
    .m-project { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .m-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 4px; border-radius: 4px;
    }
    .m-close:hover { color: var(--text); background: var(--surface2); }
    .modal-bd { padding: 18px; }

    /* Stage journey strip */
    .journey { margin-bottom: 4px; display: flex; gap: 4px; }
    .j-pip { flex: 1; height: 5px; border-radius: 3px; background: var(--border); }
    .j-pip.done   { background: var(--text-muted); }
    .j-pip.active.tg1 { background: var(--tg1-light); }
    .j-pip.active.tg3 { background: var(--tg3-light); }
    .j-pip.active.tg4 { background: var(--tg4-light); }
    .j-pip.active.tg6 { background: var(--tg6-light); }
    .j-labels { display: flex; gap: 4px; margin-bottom: 14px; }
    .j-labels span { flex: 1; font-size: 9px; color: var(--text-muted); text-align: center; text-transform: uppercase; }
    .j-labels span.active { color: var(--text-dim); font-weight: 600; }

    .m-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .m-field label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 3px; }
    .m-field .val  { font-size: 14px; color: var(--text); font-weight: 500; }
    .m-field.span2 { grid-column: 1 / -1; }
    .m-amount      { font-size: 26px; font-weight: 800; }
    .m-divider     { height: 1px; background: var(--border); margin: 14px 0; }
    .m-footer      { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      border: 1px solid transparent; text-decoration: none; transition: all 0.15s;
    }
    .btn-hs   { background: var(--tg1-bg); color: var(--tg1-light); border-color: var(--tg1); }
    .btn-hs:hover { background: var(--tg1); color: white; }
    .btn-close { background: var(--surface2); color: var(--text-dim); border-color: var(--border); }
    .btn-close:hover { color: var(--text); }

    /* Misc */
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 960px)  { .board { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 540px)  { .board { grid-template-columns: 1fr; } .stats-bar { flex-wrap: wrap; } }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="logo">RN</div>
    <div class="header-title">
      <h1>ITO-OTR Toll Gate Tracker</h1>
      <p>Renewance Project Pipeline</p>
    </div>
  </div>
  <div class="last-updated">
    <div class="refresh-dot" id="refreshDot"></div>
    <span id="lastUpdatedText">Loading…</span>
  </div>
</header>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat-label">TG1 Pipeline</div>
    <div class="stat-value blue" id="sPipeline">—</div>
    <div class="stat-sub"      id="sPipelineSub">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Win Rate (YTD)</div>
    <div class="stat-value green" id="sWinRate">—</div>
    <div class="win-bar"><div class="win-fill" id="winFill" style="width:0%"></div></div>
    <div class="stat-sub" id="sWinSub">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">In Execution</div>
    <div class="stat-value orange" id="sExec">—</div>
    <div class="stat-sub"         id="sExecSub">TG3 + TG4 projects</div>
  </div>
  <div class="stat">
    <div class="stat-label">Closeout</div>
    <div class="stat-value purple" id="sClose">—</div>
    <div class="stat-sub">TG6 debrief &amp; closeout</div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search projects or clients…" oninput="filterCards()">
  </div>
  <select id="ownerFilter" onchange="filterCards()">
    <option value="">All Owners</option>
    <option value="james polcyn">James Polcyn</option>
    <option value="yi pang">Yi Pang</option>
    <option value="ganesh bala">Ganesh Bala</option>
    <option value="sander jacobs">Sander Jacobs</option>
    <option value="james butler">James Butler</option>
  </select>
  <select id="stageFilter" onchange="filterCards()">
    <option value="">All Stages</option>
    <option value="tg1">TG1 — Hand-shake / LOI</option>
    <option value="tg3">TG3 — PM Prep</option>
    <option value="tg4">TG4 — Services Turnover</option>
    <option value="tg6">TG6 — Debrief &amp; Closeout</option>
  </select>
  <span class="filter-count" id="filterCount"></span>
</div>

<!-- BOARD -->
<div class="board">
  <div class="column tg1"><div class="col-header"><div class="col-badge">TG1</div><div class="col-name">Hand-shake / LOI</div><div class="col-count" id="cnt-tg1">0</div></div><div class="col-body" id="body-tg1"></div></div>
  <div class="column tg3"><div class="col-header"><div class="col-badge">TG3</div><div class="col-name">PM Prep</div><div class="col-count" id="cnt-tg3">0</div></div><div class="col-body" id="body-tg3"></div></div>
  <div class="column tg4"><div class="col-header"><div class="col-badge">TG4</div><div class="col-name">Services Turnover</div><div class="col-count" id="cnt-tg4">0</div></div><div class="col-body" id="body-tg4"></div></div>
  <div class="column tg6"><div class="col-header"><div class="col-badge">TG6</div><div class="col-name">Debrief &amp; Closeout</div><div class="col-count" id="cnt-tg6">0</div></div><div class="col-body" id="body-tg6"></div></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-hd">
      <div class="m-pill" id="mPill">TG1</div>
      <div class="m-title">
        <div class="m-client"  id="mClient">—</div>
        <div class="m-project" id="mProject">—</div>
      </div>
      <button class="m-close" onclick="closeModal()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-bd">
      <div class="journey">
        <div class="j-pip" id="jp-tg1"></div>
        <div class="j-pip" id="jp-tg3"></div>
        <div class="j-pip" id="jp-tg4"></div>
        <div class="j-pip" id="jp-tg6"></div>
      </div>
      <div class="j-labels">
        <span id="jl-tg1">TG1</span>
        <span id="jl-tg3">TG3</span>
        <span id="jl-tg4">TG4</span>
        <span id="jl-tg6">TG6</span>
      </div>
      <div class="m-grid">
        <div class="m-field">
          <label>Contract Value</label>
          <div class="val m-amount" id="mAmount">—</div>
        </div>
        <div class="m-field">
          <label>Owner</label>
          <div class="val" id="mOwner">—</div>
        </div>
        <div class="m-field">
          <label>Stage</label>
          <div class="val" id="mStage">—</div>
        </div>
        <div class="m-field">
          <label>Date Added</label>
          <div class="val" id="mDate">—</div>
        </div>
        <div class="m-field span2" id="wDue" style="display:none">
          <label>Due Date</label>
          <div class="val" id="mDue">—</div>
        </div>
        <div class="m-field span2" id="wProg" style="display:none">
          <label>Completion</label>
          <div class="val" id="mProg">—</div>
        </div>
        <div class="m-field span2" id="wNotes" style="display:none">
          <label>Notes</label>
          <div class="val" id="mNotes" style="font-size:13px;color:var(--text-dim);white-space:pre-wrap;line-height:1.5">—</div>
        </div>
      </div>
      <div class="m-footer" id="mFooter"></div>
    </div>
  </div>
</div>

// ── HELPERS ───────────────────────────────────────────────────────
const fmt = n => {
  if (!n || n === 0) return '$0';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n.toLocaleString();
};
const fmtFull = n => (!n && n !== 0) ? '—' : n === 0 ? 'TBD' :
  '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
const fmtDate = iso => {
  if (!iso) return '—';
  const d = new Date(iso.length === 10 ? iso + 'T12:00:00' : iso);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
};
const parseClient = name => {
  const m = name.match(/^(.+?)\s*[-–]\s*(.+)$/s);
  return m ? { client: m[1].trim(), project: m[2].trim() } : { client: name, project: '' };
};
const initials = n => n ? n.split(' ').map(w=>w[0]).slice(0,2).join('') : '?';
const ownerColor = n => OWNER_COLORS[n] || '#8b949e';

// ── BUILD CARD ────────────────────────────────────────────────────
function buildCard(item, stage) {
  const { client, project } = parseClient(item.name || item.title || '');
  const owner  = item.ownerName || item.assignedTo || '—';
  const amount = Number(item.amount) || 0;
  const date   = item.createdate || item.dueDate || '';
  const pct    = item.percentComplete;

  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.name  = (item.name || item.title || '').toLowerCase();
  el.dataset.owner = owner.toLowerCase();
  el.dataset.stage = stage;
  el.addEventListener('click', () => openModal(item, stage));

  const progressHTML = (pct != null && stage !== 'tg1') ? `
    <div class="card-progress">
      <div class="prog-row"><span>Progress</span><span>${pct}%</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>` : '';

  el.innerHTML = `
    <div class="card-top">
      <div class="card-client">${client}</div>
      <div class="card-amount">${fmt(amount)}</div>
    </div>
    <div class="card-project">${project || '—'}</div>
    ${progressHTML}
    <div class="card-footer">
      <div class="card-owner">
        <div class="avatar" style="background:${ownerColor(owner)}">${initials(owner)}</div>
        <span>${owner}</span>
      </div>
      <div class="card-date">${fmtDate(date)}</div>
    </div>`;
  return el;
}

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(item, stage) {
  const { client, project } = parseClient(item.name || item.title || '');
  const owner   = item.ownerName || item.assignedTo || '—';
  const amount  = Number(item.amount) || 0;
  const date    = item.createdate || '';
  const dueDate = item.dueDate || '';
  const notes   = item.notes || '';
  const pct     = item.percentComplete;
  const url     = item.hubspotUrl || null;

  const bgMap    = { tg1:'var(--tg1-bg)', tg3:'var(--tg3-bg)', tg4:'var(--tg4-bg)', tg6:'var(--tg6-bg)' };
  const fgMap    = { tg1:'var(--tg1-light)', tg3:'var(--tg3-light)', tg4:'var(--tg4-light)', tg6:'var(--tg6-light)' };
  const borMap   = { tg1:'var(--tg1)', tg3:'var(--tg3)', tg4:'var(--tg4)', tg6:'var(--tg6)' };
  const stageIdx = STAGE_ORDER.indexOf(stage);

  const pill = document.getElementById('mPill');
  pill.textContent = stage.toUpperCase();
  pill.style.cssText = `background:${bgMap[stage]};color:${fgMap[stage]};border:1px solid ${borMap[stage]}`;

  document.getElementById('mClient').textContent  = client;
  document.getElementById('mProject').textContent = project || '—';

  // Journey pips
  STAGE_ORDER.forEach((s, i) => {
    const pip = document.getElementById(`jp-${s}`);
    const lbl = document.getElementById(`jl-${s}`);
    pip.className = 'j-pip' + (i < stageIdx ? ' done' : i === stageIdx ? ` active ${stage}` : '');
    lbl.className = i === stageIdx ? 'active' : '';
  });

  const amountEl = document.getElementById('mAmount');
  amountEl.textContent = fmtFull(amount);
  amountEl.style.color = fgMap[stage];

  document.getElementById('mOwner').innerHTML =
    `<span style="display:inline-flex;align-items:center;gap:6px">
      <span class="avatar" style="background:${ownerColor(owner)};width:22px;height:22px;font-size:9px">${initials(owner)}</span>
      ${owner}
    </span>`;
  document.getElementById('mStage').textContent = STAGE_LABELS[stage] || stage;
  document.getElementById('mDate').textContent  = fmtDate(date);

  document.getElementById('wDue').style.display   = dueDate ? '' : 'none';
  document.getElementById('mDue').textContent     = fmtDate(dueDate);
  document.getElementById('wProg').style.display  = (pct != null && stage !== 'tg1') ? '' : 'none';
  document.getElementById('mProg').textContent    = pct != null ? `${pct}% complete` : '';
  document.getElementById('wNotes').style.display = notes ? '' : 'none';
  document.getElementById('mNotes').textContent   = notes;

  const footer = document.getElementById('mFooter');
  footer.innerHTML = '';
  if (url) {
    footer.innerHTML = `<a class="btn btn-hs" href="${url}" target="_blank" rel="noopener">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      View in HubSpot
    </a>`;
  }
  footer.innerHTML += `<button class="btn btn-close" onclick="closeModal()">Close</button>`;

  document.getElementById('overlay').classList.add('open');
}
function closeModal()      { document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e)   { if (e.target === document.getElementById('overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── RENDER ────────────────────────────────────────────────────────
let ALL_DATA = null;

function render(data) {
  ALL_DATA = data;

  // Stats
  const tg1Val = data.tg1.reduce((s, d) => s + (Number(d.amount) || 0), 0);
  const { closedWonYTD = 0, closedLostYTD = 0 } = data.stats || {};
  const denom   = closedWonYTD + closedLostYTD;
  const winRate = denom > 0 ? Math.round(closedWonYTD / denom * 100) : 0;

  document.getElementById('sPipeline').textContent    = fmt(tg1Val);
  document.getElementById('sPipelineSub').textContent = `${data.tg1.length} deals in Hand-shake / LOI`;
  document.getElementById('sWinRate').textContent     = `${winRate}%`;
  document.getElementById('winFill').style.width      = `${winRate}%`;
  document.getElementById('sWinSub').textContent      = `${closedWonYTD} won · ${denom} closed YTD`;
  document.getElementById('sExec').textContent        = data.tg3.length + data.tg4.length;
  document.getElementById('sExecSub').textContent     = `${data.tg3.length} TG3 · ${data.tg4.length} TG4`;
  document.getElementById('sClose').textContent       = data.tg6.length;

  // Columns
  for (const stage of STAGE_ORDER) {
    const items = data[stage] || [];
    const body  = document.getElementById(`body-${stage}`);
    const cnt   = document.getElementById(`cnt-${stage}`);
    body.innerHTML = '';
    cnt.textContent = items.length;

    if (!items.length) {
      const empty = document.createElement('div');
      empty.className = 'col-empty';
      if (stage === 'tg1') {
        empty.innerHTML = '<p>No deals in Hand-shake / LOI stage</p>';
      } else {
        empty.innerHTML = `
          <div class="col-empty-icon">
            <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
            </svg>
          </div>
          <p>No active projects</p>
          <div class="pa-note">⚡ Syncs daily from Microsoft Planner via Power Automate</div>`;
      }
      body.appendChild(empty);
    } else {
      items.forEach(item => body.appendChild(buildCard(item, stage)));
    }
  }

  // Last updated
  const dot = document.getElementById('refreshDot');
  if (data.lastUpdated) {
    const d = new Date(data.lastUpdated);
    const ageHrs = (Date.now() - d) / 3_600_000;
    document.getElementById('lastUpdatedText').textContent =
      `Updated ${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})} at ${d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
    if (ageHrs > 30) dot.classList.add('stale');
  } else {
    document.getElementById('lastUpdatedText').textContent = 'Embedded snapshot — Apr 27 2026';
  }

  filterCards();
}

// ── FILTER ────────────────────────────────────────────────────────
function filterCards() {
  const q     = document.getElementById('searchInput').value.toLowerCase().trim();
  const owner = document.getElementById('ownerFilter').value.toLowerCase();
  const stage = document.getElementById('stageFilter').value;
  let vis = 0;

  document.querySelectorAll('.card').forEach(c => {
    const show = (!q || c.dataset.name.includes(q))
              && (!owner || c.dataset.owner.includes(owner))
              && (!stage || c.dataset.stage === stage);
    c.classList.toggle('hidden', !show);
    if (show) vis++;
  });

  STAGE_ORDER.forEach(s => {
    document.getElementById(`cnt-${s}`).textContent =
      document.querySelectorAll(`#body-${s} .card:not(.hidden)`).length;
  });

  const total = document.querySelectorAll('.card').length;
  document.getElementById('filterCount').textContent =
    (q || owner || stage) ? `${vis} of ${total} projects` : `${total} projects`;
}

// ── LOAD ──────────────────────────────────────────────────────────
// Fetches project-data.json from the same origin (GitHub Pages).
// Power Automate commits an updated project-data.json to the repo daily at 6am.
// Falls back to embedded FALLBACK data if fetch fails.
const DATA_URL = 'project-data.json';
(async () => {
  if (window.location.protocol === 'file:') {
    console.log('[Tracker] Local file — using embedded data.');
    render(FALLBACK);
    return;
  }
  try {
    const res = await fetch(DATA_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    console.log('[Tracker] Live data loaded from SharePoint.');
    render(data);
  } catch (e) {
    console.log('[Tracker] Falling back to embedded data.', e.message);
    render(FALLBACK);
  }
})();
</script>
